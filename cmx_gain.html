<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CMX Gain</title>
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
<style>
  body { font-family: Georgia, serif; background: #f4f4f4; margin: 0; padding: 20px; }
  h1   { text-align: center; color: #222; margin-bottom: 4px; }
  .sub { text-align: center; color: #777; font-size: 13px; margin-bottom: 20px; font-style: italic; }
  .container { max-width: 1100px; margin: 0 auto; position: relative; }
  #messi { position: absolute; top: 0; right: 0; width: 160px; border-radius: 8px;
           box-shadow: 0 2px 8px rgba(0,0,0,0.25); z-index: 10; }
  .controls {
    background: white; border-radius: 8px; padding: 20px 24px 16px;
    margin-bottom: 16px; box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  }
  .controls h2 { margin: 0 0 14px; font-size: 14px; color: #555; text-transform: uppercase; letter-spacing: 1px; }
  .param-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .param label { display: block; font-size: 11px; color: #666; margin-bottom: 4px; font-weight: bold; }
  .param input {
    width: 100%; box-sizing: border-box; padding: 7px 10px;
    border: 1px solid #ccc; border-radius: 4px; font-size: 14px;
    font-family: monospace;
  }
  .param input:focus { border-color: #4A90D9; outline: none; box-shadow: 0 0 0 2px rgba(74,144,217,0.2); }
  .btn {
    display: block; width: 100%; margin-top: 16px; padding: 11px;
    background: #4A90D9; color: white; border: none; border-radius: 6px;
    font-size: 15px; cursor: pointer; font-weight: bold; letter-spacing: 0.5px;
  }
  .btn:hover { background: #357abd; }
  #error-box {
    background: #fff0f0; border: 2px solid #c0392b; border-radius: 8px;
    padding: 14px 18px; margin-bottom: 16px; display: none;
  }
  #error-box h3 { color: #c0392b; margin: 0 0 6px; font-size: 17px; }
  #error-box p  { color: #c0392b; margin: 0; font-size: 13px; line-height: 1.6; }
  .stats {
    display: none; background: white; border-radius: 8px;
    padding: 14px 20px; margin-bottom: 16px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    display: none; grid-template-columns: repeat(4, 1fr); gap: 8px;
  }
  .stat { text-align: center; padding: 8px; }
  .stat .val  { font-size: 22px; font-weight: bold; color: #4A90D9; }
  .stat .lbl  { font-size: 11px; color: #999; margin-top: 2px; }
  #chart { background: white; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
</style>
</head>

<script>
function linspace(a, b, n) {
  const r = [];
  for (let i = 0; i < n; i++) r.push(a + (b - a) * i / (n - 1));
  return r;
}

function generate() {
  const T        = parseFloat(document.getElementById('T').value);
  const CMX_BW   = parseFloat(document.getElementById('CMX_BW').value);
  const HBM      = parseFloat(document.getElementById('HBM').value);
  const RECOMP   = parseFloat(document.getElementById('RECOMPUTE').value);
  const SOL      = parseFloat(document.getElementById('SOL').value);
  const AVG      = parseFloat(document.getElementById('AVG').value);

  // ── Physics ──────────────────────────────────────────────────────────────
  const CMX_T_GB    = CMX_BW * T;
  const CMX_REQ_SEC = CMX_BW / AVG;
  const gain_ratio  = CMX_T_GB / HBM;
  const slope       = 1.0 / (AVG * T);

  const x_A_GB = RECOMP / slope;
  const x_B_GB = HBM;
  const x_C_GB = HBM + CMX_T_GB;
  const x_D_GB = SOL / slope;

  const y_A = RECOMP;
  const y_B = x_B_GB * slope;
  const y_C = x_C_GB * slope;

  const hbm_sufficient = y_B >= SOL;           // all lines hit SOL before spilling
  const hbm_small      = !hbm_sufficient && y_B < RECOMP;  // HBM fills before recompute level
  const x_C_eff      = Math.min(x_C_GB, x_D_GB);
  const y_C_actual   = Math.min(y_C, SOL);
  const sol_limited  = x_C_GB > x_D_GB;
  const gain_actual  = hbm_sufficient ? 0
    : hbm_small ? (y_C_actual - RECOMP) / RECOMP
    : (y_C_actual - y_B) / y_B;
  const CMX_draw_lvl = Math.min(CMX_REQ_SEC, SOL);  // green never exceeds SOL

  // ── Degenerate case checks ───────────────────────────────────────────────
  const errs = [];
  if (!(RECOMP < CMX_REQ_SEC))
    errs.push(`RECOMPUTE < CMX_REQ_SEC not satisfied`);

  const eb = document.getElementById('error-box');
  if (errs.length) {
    eb.style.display = 'block';
    document.getElementById('error-msg').innerHTML = errs.join('<br>');
    document.getElementById('stats').style.display = 'none';
    Plotly.purge('chart');
    return;
  }
  eb.style.display = 'none';

  // ── Stats bar ────────────────────────────────────────────────────────────
  const statsEl = document.getElementById('stats');
  statsEl.style.display = 'grid';
  const cmx_used = hbm_sufficient ? 0 : sol_limited ? (x_D_GB - x_B_GB) : CMX_T_GB;
  document.getElementById('s-cmxt').textContent   = cmx_used.toFixed(1) + ' GB';
  document.getElementById('s-with').textContent   = y_C_actual.toFixed(2) + ' reqs/s';
  document.getElementById('s-without').textContent = (hbm_sufficient ? SOL : hbm_small ? RECOMP : y_B).toFixed(2) + ' reqs/s';
  document.getElementById('s-gain').textContent   = (gain_actual * 100).toFixed(1) + '%';

  // ── Layout constants ─────────────────────────────────────────────────────
  const DROP  = (x_C_GB - x_B_GB) * 0.3;
  const X_MAX = HBM + CMX_T_GB * 4.5;
  const y_max = Math.max(SOL, CMX_REQ_SEC) * 1.18;
  const dy    = y_max * 0.008;

  const BLUE  = '#4A90D9';
  const GREEN = '#76b900';
  const BLACK = '#222222';

  const traces = [], annotations = [], shapes = [];

  // ── Helper for rising segment from B ─────────────────────────────────────
  const yrise = x => y_B + slope * (x - x_B_GB);

  // ── Segment 0→divergence: all three rise together ────────────────────────
  //    hbm_sufficient: handled in its branch (0→D)
  //    hbm_small:      divergence at x_A (black hits recompute ceiling first)
  //    normal:         divergence at x_B (HBM spills)
  if (!hbm_sufficient) {
    const x_div = hbm_small ? x_A_GB : x_B_GB;
    const xs_0d = linspace(0, x_div, 200);
    const ys_0d = xs_0d.map(x => slope * x);
    [[BLUE,+dy],[GREEN,0],[BLACK,-dy]].forEach(([c,o]) =>
      traces.push({ x:xs_0d, y:ys_0d.map(y=>y+o), mode:'lines',
        line:{color:c,width:2.5}, showlegend:false, hoverinfo:'skip' }));
  }

  if (hbm_sufficient) {
    // ── HBM sufficient: all three lines rise together from 0 and flatten at SOL
    const xs_AD = linspace(0, x_D_GB, 200);
    const ys_AD = xs_AD.map(x => Math.min(slope * x, SOL));
    [[BLUE,+dy],[GREEN,0],[BLACK,-dy]].forEach(([c,o]) =>
      traces.push({ x:xs_AD, y:ys_AD.map(y=>y+o), mode:'lines',
        line:{color:c,width:2.5}, showlegend:false, hoverinfo:'skip' }));
    [[BLUE,+dy,'infinite HBM-DRAM'],[GREEN,0,'with CMX'],[BLACK,-dy,'without CMX']].forEach(([c,o,n]) =>
      traces.push({ x:[x_D_GB, X_MAX], y:[SOL+o, SOL+o], mode:'lines',
        line:{color:c,width:2.5}, name:n, hoverinfo:'skip' }));

  } else if (hbm_small) {
    // ── HBM small: black flattens at RECOMP (x_A), blue+green continue ──────
    // blue+green: x_A → x_C_eff
    const xs_AC = linspace(x_A_GB, x_C_eff, 200);
    const ys_AC = xs_AC.map(x => Math.min(slope * x, SOL));
    traces.push({ x:xs_AC, y:ys_AC.map(y=>y+dy), mode:'lines',
      line:{color:BLUE, width:2.5}, showlegend:false, hoverinfo:'skip' });
    traces.push({ x:xs_AC, y:ys_AC, mode:'lines',
      line:{color:GREEN,width:2.5}, showlegend:false, hoverinfo:'skip' });

    if (sol_limited)
      traces.push({ x:[x_C_eff,x_C_GB], y:[SOL,SOL], mode:'lines',
        line:{color:GREEN,width:2.5}, showlegend:false, hoverinfo:'skip' });

    traces.push({ x:[x_C_GB, x_C_GB+DROP], y:[y_C_actual, CMX_draw_lvl], mode:'lines',
      line:{color:GREEN,width:2.5}, showlegend:false, hoverinfo:'skip' });
    traces.push({ x:[x_C_GB+DROP, X_MAX], y:[CMX_draw_lvl, CMX_draw_lvl], mode:'lines',
      line:{color:GREEN,width:2.5}, name:'with CMX', hoverinfo:'skip' });

    if (x_D_GB > x_C_eff) {
      const xs_s = linspace(x_C_eff, Math.min(x_D_GB, X_MAX), 200);
      traces.push({ x:xs_s, y:xs_s.map(x=>Math.min(slope*x,SOL)+dy), mode:'lines',
        line:{color:BLUE,width:2.5}, showlegend:false, hoverinfo:'skip' });
    }
    if (x_D_GB <= X_MAX)
      traces.push({ x:[x_D_GB, X_MAX], y:[SOL+dy, SOL+dy], mode:'lines',
        line:{color:BLUE,width:2.5}, name:'infinite HBM-DRAM', hoverinfo:'skip' });

    // black: flat at RECOMP from x_A onwards (no drop needed)
    traces.push({ x:[x_A_GB, X_MAX], y:[RECOMP-dy, RECOMP-dy], mode:'lines',
      line:{color:BLACK,width:2.5}, name:'without CMX', hoverinfo:'skip' });

  } else {
    // ── Normal: blue+green continue B→C_eff, black drops to RECOMP ──────────
    const xs_BC = linspace(x_B_GB, x_C_eff, 200);
    const ys_BC = xs_BC.map(x => Math.min(yrise(x), SOL));
    traces.push({ x:xs_BC, y:ys_BC.map(y=>y+dy), mode:'lines',
      line:{color:BLUE, width:2.5}, showlegend:false, hoverinfo:'skip' });
    traces.push({ x:xs_BC, y:ys_BC, mode:'lines',
      line:{color:GREEN,width:2.5}, showlegend:false, hoverinfo:'skip' });

    if (sol_limited)
      traces.push({ x:[x_C_eff,x_C_GB], y:[SOL,SOL], mode:'lines',
        line:{color:GREEN,width:2.5}, showlegend:false, hoverinfo:'skip' });

    traces.push({ x:[x_C_GB, x_C_GB+DROP], y:[y_C_actual, CMX_draw_lvl], mode:'lines',
      line:{color:GREEN,width:2.5}, showlegend:false, hoverinfo:'skip' });
    traces.push({ x:[x_C_GB+DROP, X_MAX], y:[CMX_draw_lvl, CMX_draw_lvl], mode:'lines',
      line:{color:GREEN,width:2.5}, name:'with CMX', hoverinfo:'skip' });

    if (x_D_GB > x_C_eff) {
      const xs_s = linspace(x_C_eff, Math.min(x_D_GB, X_MAX), 200);
      traces.push({ x:xs_s, y:xs_s.map(x=>Math.min(yrise(x),SOL)+dy), mode:'lines',
        line:{color:BLUE,width:2.5}, showlegend:false, hoverinfo:'skip' });
    }
    if (x_D_GB <= X_MAX)
      traces.push({ x:[x_D_GB, X_MAX], y:[SOL+dy, SOL+dy], mode:'lines',
        line:{color:BLUE,width:2.5}, name:'infinite HBM-DRAM', hoverinfo:'skip' });

    traces.push({ x:[x_B_GB, x_B_GB+DROP], y:[y_B, RECOMP], mode:'lines',
      line:{color:BLACK,width:2.5}, showlegend:false, hoverinfo:'skip' });
    traces.push({ x:[x_B_GB+DROP, X_MAX], y:[RECOMP,RECOMP], mode:'lines',
      line:{color:BLACK,width:2.5}, name:'without CMX', hoverinfo:'skip' });
  }

  // ── Reference lines ───────────────────────────────────────────────────────
  traces.push({ x:[0,X_MAX], y:[RECOMP,RECOMP], mode:'lines',
    line:{color:BLACK,width:1.5,dash:'dot'}, showlegend:false, hoverinfo:'skip' });
  traces.push({ x:[0,X_MAX], y:[CMX_REQ_SEC,CMX_REQ_SEC], mode:'lines',
    line:{color:GREEN,width:1.5,dash:'dot'}, showlegend:false, hoverinfo:'skip' });
  traces.push({ x:[0,X_MAX], y:[SOL,SOL], mode:'lines',
    line:{color:BLUE,width:1.8,dash:'dot'}, showlegend:false, hoverinfo:'skip' });

  // ── Vertical dotted lines at key x ───────────────────────────────────────
  if (hbm_sufficient) {
    shapes.push({ type:'line', x0:x_B_GB,x1:x_B_GB, y0:0,y1:y_max,
      line:{color:'#aaa',width:1.5,dash:'dot'}, xref:'x', yref:'y' });
  } else if (hbm_small) {
    // x_A = divergence point for black; x_B = HBM ref; x_C = green divergence
    [x_A_GB, x_B_GB, x_C_GB].forEach(x =>
      shapes.push({ type:'line', x0:x,x1:x, y0:0,y1:y_max,
        line:{color:'#aaa',width:1.5,dash:'dot'}, xref:'x', yref:'y' }));
  } else {
    [x_B_GB, x_C_GB].forEach(x =>
      shapes.push({ type:'line', x0:x,x1:x, y0:0,y1:y_max,
        line:{color:'#aaa',width:1.5,dash:'dot'}, xref:'x', yref:'y' }));
    if (!sol_limited && x_D_GB <= X_MAX * 0.97)
      shapes.push({ type:'line', x0:x_D_GB,x1:x_D_GB, y0:0,y1:y_max,
        line:{color:'#aaa',width:1.5,dash:'dot'}, xref:'x', yref:'y' });
  }

  // ── Point labels B, C, E, G ──────────────────────────────────────────────
  const lox = X_MAX * 0.012, loy = y_max * 0.035;
  // hbm_small: divergence is at x_A/RECOMP so B,G shift there; C,E same
  const div_x = hbm_small ? x_A_GB : x_B_GB;
  const div_y = hbm_small ? RECOMP  : y_B;
  const lbls = hbm_sufficient ? [] : [
    [div_x - lox*3,  div_y + loy,       'B'],
    [x_C_eff + lox,  y_C_actual + loy,  'C'],
    [x_C_eff + lox,  div_y + loy,       'E'],
    [div_x - lox*3,  loy * 0.5,         'G'],
  ];
  lbls.forEach(([x,y,t]) =>
    annotations.push({ x, y, text:`<b>${t}</b>`, showarrow:false,
      font:{size:13,color:'#777'}, xref:'x', yref:'y' }));

  // ── Dot markers at actual point coordinates ───────────────────────────────
  if (!hbm_sufficient) {
    const pts = [
      [div_x,   div_y,       '#777'],  // B
      [x_C_eff, y_C_actual,  '#777'],  // C
      [x_C_eff, div_y,       '#777'],  // E
      [div_x,   0,           '#777'],  // G
    ];
    pts.forEach(([px, py, col]) =>
      traces.push({ x:[px], y:[py], mode:'markers',
        marker:{ color:col, size:10, symbol:'circle', line:{color:'#555',width:2} },
        showlegend:false, hoverinfo:'skip' }));
  }

  // ── Reference labels (right edge) ────────────────────────────────────────
  annotations.push({ x:X_MAX, y:RECOMP+loy*0.6, text:'recompute',
    showarrow:false, font:{size:10,color:BLACK}, xanchor:'right', xref:'x', yref:'y' });
  annotations.push({ x:X_MAX, y:CMX_REQ_SEC+loy*0.6, text:'CMX<sub>BW</sub>',
    showarrow:false, font:{size:10,color:GREEN}, xanchor:'right', xref:'x', yref:'y' });

  // ── Helper: double-headed arrow as two annotations ───────────────────────
  function dblArrow(x1, y1, x2, y2, color, width) {
    const base = { xref:'x', yref:'y', axref:'x', ayref:'y',
                   arrowhead:2, arrowside:'end', showarrow:true, text:'' };
    annotations.push({ ...base, x:x2, y:y2, ax:x1, ay:y1, arrowcolor:color, arrowwidth:width });
    annotations.push({ ...base, x:x1, y:y1, ax:x2, ay:y2, arrowcolor:color, arrowwidth:width });
  }

  // ── Arrows (only when spill point exists) ────────────────────────────────
  if (!hbm_sufficient) {
    dblArrow(0,      0,      div_x,   0,       BLACK,      2.5);  // 0→B horizontal
    dblArrow(div_x,  0,      div_x,   div_y,   '#c0392b',  2.0);  // BG vertical
    dblArrow(div_x,  div_y,  x_C_eff, div_y,   '#333',     2.0);  // BE horizontal
    dblArrow(x_C_eff,div_y,  x_C_eff, y_C_actual,'#c0392b',2.5);  // CE vertical
  }

  // ── HBM-DRAM and CMX_BW·T span labels + formula box ─────────────────────
  const span_y = y_max * 0.93;
  const lbl_y  = span_y + y_max * 0.03;
  const box_x  = X_MAX * 0.17;
  const box_y  = y_max * 0.72;

  if (!hbm_sufficient) {
    dblArrow(0, span_y, x_B_GB, span_y, '#555', 1.5);
    annotations.push({ x: x_B_GB/2, y: lbl_y, xref:'x', yref:'y',
      text: '<b>HBM-DRAM</b>', showarrow:false,
      font:{size:10, color:'#555'}, xanchor:'center', yanchor:'bottom' });
    dblArrow(x_B_GB, span_y, x_C_GB, span_y, '#555', 1.5);
    annotations.push({ x:(x_B_GB+x_C_GB)/2, y: lbl_y, xref:'x', yref:'y',
      text:"<b>CMX<sub>BW</sub> · T<sub>between_steps</sub>  (Little's Law)</b>",
      showarrow:false, font:{size:10,color:'#555'}, xanchor:'center', yanchor:'bottom' });
  } else {
    dblArrow(0, span_y, x_B_GB, span_y, '#555', 1.5);
    annotations.push({ x: x_B_GB/2, y: lbl_y, xref:'x', yref:'y',
      text: '<b>HBM-DRAM</b>', showarrow:false,
      font:{size:10, color:'#555'}, xanchor:'center', yanchor:'bottom' });
  }

  // ── Formula box (HTML element near John Little) ─────────────────────────
  const fb = document.getElementById('formula-box');
  if (hbm_sufficient) {
    fb.style.display = 'none';
  } else if (hbm_small && !sol_limited) {
    fb.style.display = 'block';
    fb.innerHTML = `gain_ratio = CE/BG = (y<sub>C</sub> − RECOMP) / RECOMP<br><b>→ ${(gain_actual*100).toFixed(1)}%</b>`;
  } else if (sol_limited) {
    fb.style.display = 'block';
    fb.innerHTML = `<b>gain_ratio = CE/BG → ${(gain_actual*100).toFixed(1)}%</b>`;
  } else {
    fb.style.display = 'block';
    fb.innerHTML = `gain_ratio = CE/BG = CMX<sub>BW</sub>·T / HBM-DRAM<br><b>→ ${(gain_ratio*100).toFixed(1)}%</b>`;
  }

  // ── X-axis ticks (GB + agents) ────────────────────────────────────────────
  // Start with evenly spaced ticks across full range
  const n_ticks = 7;
  const tick_step = Math.ceil(X_MAX / n_ticks / 50) * 50;  // round to nearest 50
  const evenly = [];
  for (let v = 0; v <= X_MAX + tick_step; v += tick_step) evenly.push(v);

  // Always include key points
  const must_include = hbm_small ? [x_A_GB, x_B_GB, x_C_GB] : [x_B_GB, x_C_GB];

  // Merge: replace nearest evenly-spaced tick with key point if close enough
  const all = new Set(evenly.map(Math.round));
  must_include.forEach(kx => {
    const rounded = Math.round(kx);
    // remove any tick within 4% of X_MAX from the key point
    const threshold = X_MAX * 0.04;
    for (const t of all) { if (Math.abs(t - rounded) < threshold && t !== rounded) all.delete(t); }
    all.add(rounded);
  });

  // Remove any tick too close to x_D_GB
  const d_rounded = Math.round(x_D_GB);
  const fticks = Array.from(all)
    .filter(v => v >= 0 && v <= X_MAX && Math.abs(v - d_rounded) > X_MAX * 0.02)
    .sort((a,b)=>a-b);

  // ── Agents labels below x-axis ───────────────────────────────────────────
  fticks.forEach(x => {
    annotations.push({
      x: x, y: -0.055,
      xref: 'x', yref: 'paper',
      text: `${Math.round(x/AVG)} agents`,
      showarrow: false,
      font: { size: 9, color: '#555' },
      xanchor: 'center', yanchor: 'top'
    });
  });

  const layout = {
    xaxis: {
      title: { text:'<b>Active Capacity</b>', font:{size:12}, standoff:4 },
      range: [0, X_MAX],
      tickmode:'array',
      tickvals: fticks,
      ticktext: fticks.map(x => `${Math.round(x)} GB`),
      tickfont: { size:9 },
      tickangle: 0,
      gridcolor:'#e8e8e8', showgrid:true, zeroline:true
    },
    yaxis: {
      title: { text:'<b>reqs/sec</b>', font:{size:12} },
      range: [0, y_max],
      gridcolor:'#e8e8e8', showgrid:true
    },
    annotations, shapes,
    showlegend: true,
    legend: { x:0.99, y:1.08, xanchor:'right', yanchor:'top', font:{size:10},
              bgcolor:'rgba(255,255,255,0.8)', bordercolor:'#ccc', borderwidth:1 },
    plot_bgcolor:'white', paper_bgcolor:'white',
    margin: { t:50, r:80, b:80, l:65 },
    height: 560
  };

  Plotly.react('chart', traces, layout, { responsive:true, displayModeBar:false });

  // ── Second chart: throughput/concurrency → throughput (simple projection) ──
  const N2 = 100;
  const xs_samp = linspace(AVG * 0.5, X_MAX, N2);

  // y for each line at a given x (simplified, no visual drop segment)
  const yBlue  = x => Math.min(slope * x, SOL);
  const yGreen = x => x <= x_C_GB ? Math.min(slope * x, SOL) : CMX_draw_lvl;
  const yBlack = x => {
    if (hbm_sufficient) return Math.min(slope * x, SOL);
    if (hbm_small)      return x <= x_A_GB ? slope * x : RECOMP;
    return x <= x_B_GB ? slope * x : RECOMP;
  };

  const mkTrace2 = (yFn, col, name) => {
    const px = [], py = [];
    xs_samp.forEach(x => { const y = yFn(x); px.push(y / x); py.push(y); });
    return { x: px, y: py, mode: 'markers', marker: { color: col, size: 4 },
             name, hoverinfo: 'skip' };
  };

  const traces2 = [
    mkTrace2(yBlue,  BLUE,  'infinite HBM-DRAM'),
    mkTrace2(yGreen, GREEN, 'with CMX'),
    mkTrace2(yBlack, BLACK, 'without CMX'),
  ];

  // ── Pareto-optimal marker: rightmost among near-max-Y points ───────────────
  const ann2 = [];
  // stagger arrow offsets so overlapping markers stay readable
  const paretoOffsets = [
    { ax:-50, ay:-50, xanchor:'right' },  // BLUE
    { ax: 30, ay:-25, xanchor:'left'  },  // GREEN
    { ax: 30, ay:  5, xanchor:'left'  },  // BLACK
  ];
  traces2.forEach((t, idx) => {
    if (idx >= 3) return;  // only the original 3 traces
    const maxY = Math.max(...t.y);
    // consider all points within 1% of max Y, pick the rightmost X among them
    let bestI = 0;
    for (let i = 1; i < t.y.length; i++) {
      const nearMax = t.y[i] >= maxY * 0.99;
      const prevNearMax = t.y[bestI] >= maxY * 0.99;
      if ((nearMax && !prevNearMax) ||
          (nearMax && prevNearMax && t.x[i] > t.x[bestI]))
        bestI = i;
    }
    const px = t.x[bestI], py = t.y[bestI], col = t.marker.color;
    const off = paretoOffsets[idx];
    traces2.push({ x:[px], y:[py], mode:'markers',
      marker:{ color:col, size:10, symbol:'circle' },
      showlegend:false, hoverinfo:'skip' });
    ann2.push({ x:px, y:py, text:`<b style="color:${col}">Pareto optimal</b>`,
      showarrow:true, arrowhead:2, arrowcolor:col, arrowwidth:1.5,
      ax:off.ax, ay:off.ay, font:{size:10, color:col},
      xref:'x', yref:'y', xanchor:off.xanchor });
  });

  const x2max = slope * 1.3;
  const layout2 = {
    title: { text: 'CMX Gain — Efficiency View', font:{size:16,family:'serif'} },
    xaxis: { title:{ text:'<b>reqs/sec/user</b>', font:{size:12} },
             range:[0, x2max], gridcolor:'#e8e8e8', showgrid:true, tickangle:0 },
    yaxis: { title:{ text:'<b>reqs/sec</b>', font:{size:12} },
             range:[0, y_max], gridcolor:'#e8e8e8', showgrid:true },
    annotations: ann2,
    showlegend:true,
    legend:{ x:1.02, y:0.99, xanchor:'left', yanchor:'top', font:{size:10},
             bgcolor:'rgba(255,255,255,0.8)', bordercolor:'#ccc', borderwidth:1 },
    plot_bgcolor:'white', paper_bgcolor:'white',
    margin:{ t:50, r:160, b:80, l:65 },
    height: 500
  };
  Plotly.react('chart2', traces2, layout2, { responsive:true, displayModeBar:false });
}

window.onload = generate;
</script>
</body>
</html>
